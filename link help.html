<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Social Links Dashboard</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #b0b0b0;
            --accent-color: #00d4ff;
            --border-color: #2d3561;
            --success-color: #4ade80;
            --danger-color: #ef4444;
            --card-bg: #0f1419;
            --sidebar-bg: #0d1117;
            --hover-bg: #1f2a47;
            --progress-bg: #00d4ff;
            --platform-youtube: #ff0000;
            --platform-facebook: #1877f2;
            --platform-instagram: #e1306c;
            --platform-linkedin: #0a66c2;
            --platform-pinterest: #e60023;
            --platform-tumblr: #36465d;
        }

        body.light-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8f0fe;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --accent-color: #1f2937;
            --border-color: #dadce0;
            --card-bg: #ffffff;
            --sidebar-bg: #f8f9fa;
            --hover-bg: #f0f0f0;
        }

        body.whatsapp-theme {
            --bg-primary: #0a1929;
            --bg-secondary: #0d1b2a;
            --bg-tertiary: #128c7e;
            --text-primary: #ffffff;
            --text-secondary: #ababab;
            --accent-color: #25d366;
            --border-color: #1e2835;
            --card-bg: #1a2332;
            --sidebar-bg: #0d1b2a;
            --hover-bg: #1f2a3a;
            --progress-bg: #25d366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .theme-switcher {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .theme-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background-color: var(--hover-bg);
        }

        .theme-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .companies-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .company-item {
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .company-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        .company-item.active {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-primary);
        }

        .header {
            padding: 24px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .export-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--hover-bg);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* ============ COMPANY SECTION ============ */
        .company-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .company-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }

        .progress-container {
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 8px;
            background-color: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background-color: var(--progress-bg);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* ============ LINKS GRID ============ */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
            gap: 16px;
        }

        .platform-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            transition: all 0.2s;
        }

        .platform-card:hover {
            border-color: var(--accent-color);
            background-color: var(--hover-bg);
        }

        .platform-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .platform-icon {
            font-size: 20px;
        }

        .platform-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .platform-select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .url-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .url-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .url-input::placeholder {
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-add {
            flex: 1;
            padding: 10px;
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            padding: 10px 16px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            opacity: 0.9;
        }

        /* ============ OUTPUT PREVIEW ============ */
        .output-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-top: 24px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .output-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .output-preview {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-preview.empty {
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 16px;
        }

        /* ============ LINKS LIST ============ */
        .links-list {
            margin-top: 16px;
        }

        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background-color: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }

        .link-item-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-item-platform {
            font-weight: 600;
            min-width: 100px;
        }

        .link-item-url {
            color: var(--text-secondary);
            word-break: break-all;
            font-size: 12px;
        }

        .btn-remove {
            padding: 6px 12px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            opacity: 0.9;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background-color: var(--success-color);
            color: white;
            border-radius: 6px;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
            }

            .companies-list {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 10px;
            }

            .company-item {
                white-space: nowrap;
                flex-shrink: 0;
            }

            .export-buttons {
                flex-wrap: wrap;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ============ SCROLLBAR STYLING ============ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
</head>
<body class="dark-theme">
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📊 WhatsApp Dashboard</h2>
                <div class="theme-switcher">
                    <button class="theme-btn active" data-theme="dark">Dark</button>
                    <button class="theme-btn" data-theme="light">Light</button>
                    <button class="theme-btn" data-theme="whatsapp">WhatsApp</button>
                </div>
            </div>
            <div class="companies-list" id="companiesList"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <div class="header">
                <h1 id="pageTitle">Select a Company</h1>
                <div class="export-buttons">
                    <button class="btn btn-secondary" id="copyBtn" disabled>
                        📋 Copy to Clipboard
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn" disabled>
                        ⬇️ Download TXT
                    </button>
                    <button class="btn btn-primary" id="whatsappBtn" disabled>
                        💬 Send via WhatsApp
                    </button>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-area">
                <!-- COMPANY SECTION -->
                <div class="company-section" id="companySection" style="display: none;">
                    <div class="company-title">
                        <span id="companyName"></span>
                        <span class="company-badge" id="platformCount">0/6</span>
                    </div>

                    <div class="progress-container">
                        <div class="progress-label">
                            <span>Platforms Added</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- LINKS GRID -->
                    <div class="links-grid">
                        <div class="platform-card">
                            <div class="platform-label">
                                <span class="platform-icon">🎬</span>
                                <span>Add Social Media Links</span>
                            </div>
                            <select class="platform-select" id="platformSelect">
                                <option value="">Select Platform...</option>
                                <option value="youtube">🔴 YouTube</option>
                                <option value="facebook">🔵 Facebook</option>
                                <option value="instagram">📸 Instagram</option>
                                <option value="linkedin">💼 LinkedIn</option>
                                <option value="pinterest">📌 Pinterest</option>
                                <option value="tumblr">🌀 Tumblr</option>
                            </select>
                            <input
                                type="text"
                                class="url-input"
                                id="urlInput"
                                placeholder="Paste or type the URL here..."
                            />
                            <div class="button-group">
                                <button class="btn-add" id="addBtn">+ Add Link</button>
                                <button class="btn-clear" id="clearAllBtn">Clear All</button>
                            </div>
                        </div>
                    </div>

                    <!-- LINKS LIST -->
                    <div class="links-list" id="linksList"></div>
                </div>

                <!-- OUTPUT PREVIEW -->
                <div class="output-section">
                    <div class="output-header">
                        <h3>📤 WhatsApp Output Preview</h3>
                    </div>
                    <div class="output-preview empty" id="outputPreview">
                        Select a company and add links to see the WhatsApp formatted output...
                    </div>
                </div>
            </div>
        </div>
    </div>

     <script>
        // ============ DATA STRUCTURE ============
        const companies = [
            'Varsha Almirah',
            'Meghaa Technologies',
            'Business Marketer',
            'Efficient Earth',
            'EarnEasy24',
            'SurveysIQ',
            'TechAirCraft',
            'ICS Prevail'
        ];

        const platformEmojis = {
            youtube: '🔴',
            facebook: '🔵',
            instagram: '📸',
            linkedin: '💼',
            pinterest: '📌',
            tumblr: '🌀'
        };

        const platformNames = {
            youtube: 'YouTube',
            facebook: 'Facebook',
            instagram: 'Instagram',
            linkedin: 'LinkedIn',
            pinterest: 'Pinterest',
            tumblr: 'Tumblr'
        };

        const platformDomains = {
            youtube: ['youtube.com', 'youtu.be'],
            facebook: ['facebook.com', 'fb.com'],
            instagram: ['instagram.com'],
            linkedin: ['linkedin.com'],
            pinterest: ['pinterest.com'],
            tumblr: ['tumblr.com']
        };

        let data = {};
        let selectedCompany = null;

        // Initialize data structure
        function initData() {
            companies.forEach(company => {
                if (!data[company]) {
                    data[company] = {};
                }
            });
            loadFromLocalStorage();
        }

        // ============ LOCAL STORAGE ============
        function saveToLocalStorage() {
            localStorage.setItem('whatsappDashboardData', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const stored = localStorage.getItem('whatsappDashboardData');
            if (stored) {
                try {
                    data = JSON.parse(stored);
                } catch (e) {
                    console.error('Error loading data:', e);
                }
            }
        }

        // ============ AUTO PLATFORM DETECTION ============
        function detectPlatform(url) {
            const lowerUrl = url.toLowerCase();
            for (const [platform, domains] of Object.entries(platformDomains)) {
                if (domains.some(domain => lowerUrl.includes(domain))) {
                    return platform;
                }
            }
            return null;
        }

        // ============ UI RENDERING ============
        function renderCompanies() {
            const list = document.getElementById('companiesList');
            list.innerHTML = '';

            companies.forEach(company => {
                const item = document.createElement('div');
                item.className = 'company-item';
                if (company === selectedCompany) item.classList.add('active');
                item.textContent = company;
                item.addEventListener('click', () => selectCompany(company));
                list.appendChild(item);
            });
        }

        function selectCompany(company) {
            selectedCompany = company;
            renderCompanies();
            renderCompanySection();
            updateButtonStates();
        }

        function renderCompanySection() {
            if (!selectedCompany) return;

            const section = document.getElementById('companySection');
            section.style.display = 'block';

            document.getElementById('pageTitle').textContent = selectedCompany;
            document.getElementById('companyName').textContent = selectedCompany;

            updateProgress();
            renderLinksList();
            updateOutput();
        }

        function updateProgress() {
            const links = Object.keys(data[selectedCompany] || {});
            const total = 6;
            const count = links.length;
            const percent = Math.round((count / total) * 100);

            document.getElementById('platformCount').textContent = `${count}/${total}`;
            document.getElementById('progressPercent').textContent = `${percent}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        function renderLinksList() {
            const listContainer = document.getElementById('linksList');
            const links = data[selectedCompany] || {};

            listContainer.innerHTML = '';

            if (Object.keys(links).length === 0) {
                return;
            }

            Object.entries(links).forEach(([platform, url]) => {
                const item = document.createElement('div');
                item.className = 'link-item';
                item.innerHTML = `
                    <div class="link-item-content">
                        <span>${platformEmojis[platform]}</span>
                        <div>
                            <div class="link-item-platform">${platformNames[platform]}</div>
                            <div class="link-item-url">${truncateUrl(url)}</div>
                        </div>
                    </div>
                    <button class="btn-remove" onclick="removeLink('${platform}')">Remove</button>
                `;
                listContainer.appendChild(item);
            });
        }

        function truncateUrl(url) {
            return url.length > 50 ? url.substring(0, 47) + '...' : url;
        }

        function updateOutput() {
            const preview = document.getElementById('outputPreview');

            if (!selectedCompany) {
                preview.innerHTML = 'Select a company to view output...';
                preview.classList.add('empty');
                return;
            }

            const output = generateSelectedCompanyOutput();

            if (!output.trim()) {
                preview.innerHTML = `No links added for ${selectedCompany} yet. Add some social media links to see the formatted output.`;
                preview.classList.add('empty');
            } else {
                preview.innerHTML = output;
                preview.classList.remove('empty');
            }
        }

        function generateWhatsAppOutput() {
            const platformOrder = ['youtube', 'facebook', 'pinterest', 'linkedin', 'tumblr', 'instagram'];
            let output = '';

            companies.forEach(company => {
                const links = data[company] || {};
                if (Object.keys(links).length === 0) return;

                output += `> ${company}\n`;

                platformOrder.forEach(platform => {
                    if (!links[platform]) return;
                    output += `*${platformEmojis[platform]} ${platformNames[platform]}:* ${links[platform]}\n`;
                });

                output += '\n';
            });

            return output.trim();
        }

        function generateSelectedCompanyOutput() {
            if (!selectedCompany) return '';

            const links = data[selectedCompany] || {};
            if (Object.keys(links).length === 0) return '';

            const platformOrder = ['youtube', 'facebook', 'pinterest', 'linkedin', 'tumblr', 'instagram'];
            let output = `> ${selectedCompany}\n`;

            platformOrder.forEach(platform => {
                if (!links[platform]) return;
                output += `*${platformEmojis[platform]} ${platformNames[platform]}:* ${links[platform]}\n`;
            });

            return output.trim();
        }

        // ============ LINK MANAGEMENT ============
        function addLink() {
            const platform = document.getElementById('platformSelect').value;
            const url = document.getElementById('urlInput').value.trim();

            if (!selectedCompany) {
                alert('Please select a company first.');
                return;
            }

            if (!platform) {
                alert('Please select a platform.');
                return;
            }

            if (!url) {
                alert('Please enter a URL.');
                return;
            }

            if (!/^https?:\/\//i.test(url)) {
                alert('URL must start with http:// or https://');
                return;
            }

            if (!data[selectedCompany]) {
                data[selectedCompany] = {};
            }

            data[selectedCompany][platform] = url;
            saveToLocalStorage();

            document.getElementById('platformSelect').value = '';
            document.getElementById('urlInput').value = '';

            renderCompanySection();
            updateButtonStates();
        }

        function removeLink(platform) {
            if (!selectedCompany) return;
            delete data[selectedCompany][platform];
            saveToLocalStorage();
            renderCompanySection();
            updateButtonStates();
        }

        function clearAllLinks() {
            if (!selectedCompany) return;
            if (confirm(`Clear all links for ${selectedCompany}?`)) {
                data[selectedCompany] = {};
                saveToLocalStorage();
                renderCompanySection();
                updateButtonStates();
            }
        }

        // ============ AUTO-DETECTION ============
        document.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            const platformSelect = document.getElementById('platformSelect');

            urlInput.addEventListener('paste', (e) => {
                setTimeout(() => {
                    const url = urlInput.value;
                    const detected = detectPlatform(url);
                    if (detected) {
                        platformSelect.value = detected;
                    }
                }, 10);
            });

            urlInput.addEventListener('input', () => {
                const detected = detectPlatform(urlInput.value);
                if (detected) {
                    platformSelect.value = detected;
                }
            });
        });

        // ============ EXPORT FUNCTIONS ============
        function copyToClipboard() {
            const output = generateWhatsAppOutput();
            if (!output) {
                alert('No links to copy.');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showCopyFeedback('Copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy to clipboard');
            });
        }

        function downloadAsTextFile() {
            const output = generateWhatsAppOutput();
            if (!output) {
                alert('No links to download.');
                return;
            }

            const safeName = selectedCompany.replace(/\s+/g, '_');
            const filename = `${safeName}_social_links.txt`;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(output));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function sendViaWhatsApp() {
            const output = generateWhatsAppOutput();
            if (!output) {
                alert('No links to send.');
                return;
            }

            const encodedText = encodeURIComponent(output);
            const whatsappUrl = `https://wa.me/?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }

        function showCopyFeedback(message) {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = message;
            document.body.appendChild(feedback);

            setTimeout(() => {
                feedback.remove();
            }, 3000);
        }

        // ============ BUTTON STATES ============
        function updateButtonStates() {
            const hasLinks = selectedCompany && Object.keys(data[selectedCompany] || {}).length > 0;
            
            document.getElementById('copyBtn').disabled = !hasLinks;
            document.getElementById('downloadBtn').disabled = !hasLinks;
            document.getElementById('whatsappBtn').disabled = !hasLinks;
        }

        // ============ THEME SWITCHING ============
        function initThemes() {
            const themeButtons = document.querySelectorAll('.theme-btn');
            const saved = localStorage.getItem('whatsappDashboardTheme') || 'dark';

            document.body.className = saved + '-theme';
            themeButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === saved) {
                    btn.classList.add('active');
                }
            });

            themeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    document.body.className = theme + '-theme';
                    localStorage.setItem('whatsappDashboardTheme', theme);

                    themeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            initData();
            renderCompanies();
            initThemes();

            // Button events
            document.getElementById('addBtn').addEventListener('click', addLink);
            document.getElementById('clearAllBtn').addEventListener('click', clearAllLinks);
            document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
            document.getElementById('downloadBtn').addEventListener('click', downloadAsTextFile);
            document.getElementById('whatsappBtn').addEventListener('click', sendViaWhatsApp);

            // Enter key to add link
            document.getElementById('urlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addLink();
                }
            });

            updateButtonStates();
        });
    </script>
</body>
</html>
